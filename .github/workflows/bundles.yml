name: Platform bundles

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      capture_linux_persistence:
        description: Capture sanitized Linux package persistence candidates only
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    name: Windows NSIS bundle
    if: github.event_name != 'workflow_dispatch' || inputs.capture_linux_persistence != true
    runs-on: windows-latest
    steps:
      - name: Preserve repository line endings
        run: git config --global core.autocrlf false

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/BatCave.App/package-lock.json

      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: 1.97.1
          components: rustfmt

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: batcave-bundle-release-${{ runner.os }}-${{ runner.arch }}
          workspaces: src/BatCave.App/src-tauri -> target
          cache-workspace-crates: false
          save-if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Install frontend dependencies
        run: npm ci
        working-directory: src/BatCave.App

      - name: Bundle Windows app
        shell: pwsh
        run: ./scripts/validate-tauri.ps1 -BundleOnly

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: batcave-windows-nsis-${{ github.run_id }}
          path: src/BatCave.App/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 14

  linux:
    name: Linux deb and AppImage bundles
    runs-on: ubuntu-22.04
    steps:
      - name: Preserve repository line endings
        run: git config --global core.autocrlf false

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/BatCave.App/package-lock.json

      - uses: dtolnay/rust-toolchain@46511b1c83438f0dd37c02d843619ece5a4abb5b # 1.97.1
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: batcave-package-release-${{ runner.os }}-${{ runner.arch }}
          workspaces: src/BatCave.App/src-tauri -> target
          cache-workspace-crates: false
          save-if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Install Linux native dependencies
        run: bash scripts/install-linux-deps.sh

      - name: Install frontend dependencies
        run: npm ci
        working-directory: src/BatCave.App

      - name: Bundle Linux app
        env:
          BATCAVE_SOURCE_COMMIT_SHA: ${{ github.sha }}
        run: bash scripts/validate-tauri.sh --bundle-only

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: batcave-linux-bundles-${{ github.run_id }}
          path: |
            src/BatCave.App/src-tauri/target/release/bundle/deb/*.deb
            src/BatCave.App/src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error
          retention-days: 14

      - name: Capture Linux current-user persistence candidates
        id: persistence
        if: github.event_name == 'workflow_dispatch' && inputs.capture_linux_persistence == true && github.actor == github.repository_owner
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          debs=(src/BatCave.App/src-tauri/target/release/bundle/deb/*.deb)
          appimages=(src/BatCave.App/src-tauri/target/release/bundle/appimage/*.AppImage)
          [[ "${#debs[@]}" -eq 1 ]] || { echo "Expected exactly one deb." >&2; exit 1; }
          [[ "${#appimages[@]}" -eq 1 ]] || { echo "Expected exactly one AppImage." >&2; exit 1; }
          output="${RUNNER_TEMP}/batcave-linux-persistence-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          node scripts/capture-linux-current-user-persistence.mjs \
            --deb "${debs[0]}" \
            --appimage "${appimages[0]}" \
            --source-sha "${GITHUB_SHA}" \
            --output-dir "${output}"
          node scripts/validate-current-user-persistence-evidence.mjs "${output}"/*.json
          echo "path=${output}" >> "${GITHUB_OUTPUT}"

      - name: Upload sanitized Linux persistence candidates
        if: github.event_name == 'workflow_dispatch' && inputs.capture_linux_persistence == true && github.actor == github.repository_owner
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: batcave-linux-persistence-${{ github.run_id }}
          path: ${{ steps.persistence.outputs.path }}/*.json
          if-no-files-found: error
          retention-days: 14

  macos:
    name: macOS Apple Silicon ad-hoc bundle
    if: github.event_name != 'workflow_dispatch' || inputs.capture_linux_persistence != true
    runs-on: macos-15
    steps:
      - name: Preserve repository line endings
        run: git config --global core.autocrlf false

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/BatCave.App/package-lock.json

      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: 1.97.1
          components: rustfmt
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: batcave-bundle-release-${{ runner.os }}-${{ runner.arch }}
          workspaces: src/BatCave.App/src-tauri -> target
          cache-workspace-crates: false
          save-if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Install frontend dependencies
        run: npm ci
        working-directory: src/BatCave.App

      - name: Build ad-hoc signed Apple Silicon DMG
        env:
          APPLE_SIGNING_IDENTITY: "-"
          CI: "true"
        run: bash scripts/validate-tauri.sh --bundle-only

      - name: Verify Apple Silicon app and DMG
        run: bash scripts/verify-macos-bundle.sh --mode adhoc

      - name: Test updater archive guards
        run: bash scripts/test-macos-updater-archive.sh

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: batcave-macos-arm64-dmg-${{ github.run_id }}
          path: |
            src/BatCave.App/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src/BatCave.App/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app
          if-no-files-found: error
          retention-days: 14
