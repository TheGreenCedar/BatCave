name: Platform bundles

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows:
    name: Windows NSIS bundle
    runs-on: windows-latest
    steps:
      - name: Preserve repository line endings
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/BatCave.App/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install frontend dependencies
        run: npm ci
        working-directory: src/BatCave.App

      - name: Validate and bundle Windows app
        shell: pwsh
        env:
          BATCAVE_INSTALLED_RELEASE: "1"
        run: ./scripts/validate-tauri.ps1

      - uses: actions/upload-artifact@v6
        with:
          name: batcave-windows-nsis-${{ github.run_id }}
          path: src/BatCave.App/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 14

  linux:
    name: Linux deb and AppImage bundles
    runs-on: ubuntu-latest
    steps:
      - name: Preserve repository line endings
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/BatCave.App/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install Linux native dependencies
        run: bash scripts/install-linux-deps.sh

      - name: Install frontend dependencies
        run: npm ci
        working-directory: src/BatCave.App

      - name: Validate and bundle Linux app
        run: bash scripts/validate-tauri.sh

      - uses: actions/upload-artifact@v6
        with:
          name: batcave-linux-bundles-${{ github.run_id }}
          path: |
            src/BatCave.App/src-tauri/target/release/bundle/deb/*.deb
            src/BatCave.App/src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error
          retention-days: 14
