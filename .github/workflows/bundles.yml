name: Platform bundles

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    name: Windows NSIS bundle
    runs-on: windows-latest
    steps:
      - name: Preserve repository line endings
        run: git config --global core.autocrlf false

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/BatCave.App/package-lock.json

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.97.1
          components: rustfmt

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: batcave-bundle-release-${{ runner.os }}-${{ runner.arch }}
          workspaces: src/BatCave.App/src-tauri -> target
          cache-workspace-crates: false
          save-if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Install frontend dependencies
        run: npm ci
        working-directory: src/BatCave.App

      - name: Bundle Windows app
        shell: pwsh
        env:
          BATCAVE_INSTALLED_RELEASE: "1"
        run: ./scripts/validate-tauri.ps1 -BundleOnly

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: batcave-windows-nsis-${{ github.run_id }}
          path: src/BatCave.App/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 14

  linux:
    name: Linux deb and AppImage bundles
    runs-on: ubuntu-22.04
    steps:
      - name: Preserve repository line endings
        run: git config --global core.autocrlf false

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/BatCave.App/package-lock.json

      - uses: dtolnay/rust-toolchain@4e529fb27e59237866a6523e61ab248308c068b4 # 1.88.0
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: batcave-package-release-${{ runner.os }}-${{ runner.arch }}
          workspaces: src/BatCave.App/src-tauri -> target
          cache-workspace-crates: false
          save-if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Install Linux native dependencies
        run: bash scripts/install-linux-deps.sh

      - name: Install frontend dependencies
        run: npm ci
        working-directory: src/BatCave.App

      - name: Bundle Linux app
        run: bash scripts/validate-tauri.sh --bundle-only

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: batcave-linux-bundles-${{ github.run_id }}
          path: |
            src/BatCave.App/src-tauri/target/release/bundle/deb/*.deb
            src/BatCave.App/src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error
          retention-days: 14

  macos:
    name: macOS universal ad-hoc bundle
    runs-on: macos-15
    steps:
      - name: Preserve repository line endings
        run: git config --global core.autocrlf false

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/BatCave.App/package-lock.json

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.97.1
          components: rustfmt
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: batcave-bundle-release-${{ runner.os }}-${{ runner.arch }}
          workspaces: src/BatCave.App/src-tauri -> target
          cache-workspace-crates: false
          save-if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Install frontend dependencies
        run: npm ci
        working-directory: src/BatCave.App

      - name: Build ad-hoc signed universal DMG
        env:
          APPLE_SIGNING_IDENTITY: "-"
          CI: "true"
        run: bash scripts/validate-tauri.sh --bundle-only

      - name: Verify universal app and DMG
        run: bash scripts/verify-macos-bundle.sh --mode adhoc

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: batcave-macos-universal-dmg-${{ github.run_id }}
          path: |
            src/BatCave.App/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src/BatCave.App/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
          if-no-files-found: error
          retention-days: 14
