name: Dependency advisory audit

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend production dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/BatCave.App/package-lock.json

      - run: npm ci
        working-directory: src/BatCave.App

      - run: npm audit --omit=dev --audit-level=moderate
        working-directory: src/BatCave.App

  rust:
    name: Rust advisories
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - uses: dtolnay/rust-toolchain@stable

      - name: Install pinned cargo-audit
        run: cargo install cargo-audit --version 0.22.2 --locked

      - name: Test the reviewed-warning gate
        run: node --test scripts/validate-cargo-audit-baseline.test.mjs

      - name: Audit Rust dependencies
        run: cargo audit --json > cargo-audit.json
        working-directory: src/BatCave.App/src-tauri

      - name: Enforce the reviewed-warning baseline
        run: node scripts/validate-cargo-audit-baseline.mjs src/BatCave.App/src-tauri/cargo-audit.json .github/security/cargo-audit-baseline.json
