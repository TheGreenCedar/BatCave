          RELEASE_SOURCE_SHA: ${{ needs.prepare.outputs.source_sha }}
        run: node scripts/linux-deb-post-public-smoke.mjs "${RELEASE_TAG}" "${RELEASE_SOURCE_SHA}"

      - name: Retain sanitized Linux deb post-public observation
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
