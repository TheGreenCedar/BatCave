  macos_updater_post_public_smoke:
    name: macOS updater post-public staging smoke
    needs: [prepare, finalize]
    if: needs.prepare.outputs.publish == 'true'
    runs-on: macos-15
    environment: release
    permissions:
      contents: read
      attestations: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.source_sha }}

      - name: Verify protected release controls before sensitive work
        env:
          GH_TOKEN: ${{ secrets.RELEASE_ADMIN_READ_TOKEN }}
        run: node scripts/verify-release-controls.mjs "${{ github.repository }}"

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          package-manager-cache: false

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: batcave-bundle-release-${{ runner.os }}-${{ runner.arch }}
          workspaces: src/BatCave.App/src-tauri -> target
          cache-workspace-crates: false
          save-if: false

      - name: Verify and stage the exact published macOS updater archive
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
          RELEASE_SOURCE_SHA: ${{ needs.prepare.outputs.source_sha }}
        run: |
          set -euo pipefail
          umask 077
          mkdir post-public-output
          observation="post-public-output/macos-updater-observation.json"
          cargo run --quiet --locked --manifest-path src/BatCave.App/src-tauri/Cargo.toml --bin batcave-install-smoke --features private-release-verifier -- "${RELEASE_TAG}" macos-updater > "${observation}"
          node scripts/validate-macos-updater-post-public-observation.mjs "${observation}" "${RELEASE_TAG}" "${RELEASE_SOURCE_SHA}"

      - name: Retain sanitized macOS updater post-public observation
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: batcave-macos-updater-post-public-${{ needs.prepare.outputs.tag }}
          path: post-public-output/macos-updater-observation.json
          if-no-files-found: error
          retention-days: 30
