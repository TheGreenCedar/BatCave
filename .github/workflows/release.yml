    needs: [prepare, finalize]
    if: needs.prepare.outputs.publish == 'true'
    runs-on: ubuntu-22.04
    environment: release
    permissions:
      contents: read
      attestations: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.source_sha }}

      - name: Verify protected release controls before sensitive work
        env:
          GH_TOKEN: ${{ secrets.RELEASE_ADMIN_READ_TOKEN }}
