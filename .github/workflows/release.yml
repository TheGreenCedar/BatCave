name: Versioned release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Version tag matching the app version
        required: true
      source_sha:
        description: Exact 40-character commit SHA approved for release from the tip of main
        required: true
      channel:
        description: Release channel
        required: true
        type: choice
        options:
          - prerelease
          - stable
        default: prerelease
      publish:
        description: Create the GitHub Release after successful builds
        required: true
        type: boolean
        default: false

permissions:
  contents: read

env:
  BATCAVE_SOURCE_COMMIT_SHA: ${{ github.sha }}

jobs:
  prepare:
    name: Validate release identity
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      prerelease: ${{ steps.release.outputs.prerelease }}
      publish: ${{ steps.release.outputs.publish }}
      source_sha: ${{ steps.release.outputs.source_sha }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Validate exact release identity and availability
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_SOURCE_SHA: ${{ inputs.source_sha }}
          INPUT_CHANNEL: ${{ inputs.channel }}
          INPUT_PUBLISH: ${{ inputs.publish }}
        run: |
          set -euo pipefail
          [[ "${GITHUB_REF}" == "refs/heads/main" ]] || {
            echo "Releases must be dispatched from main." >&2
            exit 1
          }
          tag="${INPUT_TAG}"
          approved_source_sha="${INPUT_SOURCE_SHA}"
          channel="${INPUT_CHANNEL}"
          publish="${INPUT_PUBLISH}"

          node scripts/verify-release-version.mjs "${tag}"
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          source_sha="${GITHUB_SHA}"
          main_sha="$(git rev-parse refs/remotes/origin/main^0)"
          node scripts/verify-release-candidate.mjs identity "${tag}" "${channel}" "${source_sha}" "${main_sha}" "${approved_source_sha}"

          prerelease="false"
          [[ "${tag#v}" == *-* ]] && prerelease="true"

          if git ls-remote --exit-code --refs origin "refs/tags/${tag}" >/dev/null; then
            echo "Release tag ${tag} already exists." >&2
            exit 1
          else
            status=$?
            [[ "${status}" -eq 2 ]] || exit "${status}"
          fi

          release_error="${RUNNER_TEMP}/release-read-error.txt"
          if gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${tag}" >/dev/null 2>"${release_error}"; then
            echo "GitHub Release ${tag} already exists." >&2
            exit 1
          fi
          grep -q "HTTP 404" "${release_error}" || { cat "${release_error}" >&2; exit 1; }

          {
            echo "tag=${tag}"
            echo "prerelease=${prerelease}"
            echo "publish=${publish}"
            echo "source_sha=${source_sha}"
          } >> "${GITHUB_OUTPUT}"

      - name: Test release contracts
        run: node --test scripts/verify-release-version.test.mjs scripts/build-update-manifest.test.mjs scripts/verify-linux-bundle.test.mjs scripts/verify-release-candidate.test.mjs scripts/verify-release-controls.test.mjs scripts/verify-public-release.test.mjs scripts/linux-deb-post-public-smoke.test.mjs scripts/linux-appimage-post-public-smoke.test.mjs scripts/validate-macos-updater-post-public-observation.test.mjs scripts/validate-release-platform-support.test.mjs scripts/validate-release-evidence-packet.test.mjs scripts/validate-release-evidence-index.test.mjs scripts/public-artifact-install-smoke.test.mjs scripts/native-install-smoke-executor.test.mjs scripts/linux-native-install-smoke-adapter.test.mjs scripts/capture-linux-current-user-persistence.test.mjs scripts/capture-macos-current-user-persistence.test.mjs scripts/capture-macos-dmg-current-user-persistence.test.mjs scripts/validate-current-user-persistence-evidence.test.mjs

  windows:
    name: Build Windows release
    needs: prepare
    runs-on: windows-latest
    environment: release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.source_sha }}

      - name: Verify protected release controls before sensitive work
        env:
          GH_TOKEN: ${{ secrets.RELEASE_ADMIN_READ_TOKEN }}
        run: node scripts/verify-release-controls.mjs "${{ github.repository }}"

      - name: Preserve repository line endings
        run: git config --global core.autocrlf false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/BatCave.App/package-lock.json

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.97.1
          components: rustfmt

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: batcave-bundle-release-${{ runner.os }}-${{ runner.arch }}
          workspaces: src/BatCave.App/src-tauri -> target
          cache-workspace-crates: false
          save-if: false

      - run: npm ci
        working-directory: src/BatCave.App

      - run: node scripts/verify-release-version.mjs "${{ needs.prepare.outputs.tag }}"

      - name: Validate Windows app
        shell: pwsh
        run: ./scripts/validate-tauri.ps1 -SkipBundle

      - name: Bundle signed Windows updater
        working-directory: src/BatCave.App
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri -- build --config src-tauri/tauri.updater.conf.json

      - name: Verify generated release NSIS shortcut contract
        working-directory: src/BatCave.App
        run: npm run verify:windows-installer-generated -- "src-tauri/target/release/nsis/x64/installer.nsi"

      - name: Collect Windows distributables
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist/windows | Out-Null
          Copy-Item -LiteralPath src/BatCave.App/src-tauri/target/release/batcave-monitor.exe -Destination dist/windows/
          Copy-Item -LiteralPath src/BatCave.App/src-tauri/target/release/batcave-monitor-cli.exe -Destination dist/windows/
          Copy-Item -Path 'src/BatCave.App/src-tauri/target/release/bundle/nsis/*.exe' -Destination dist/windows/
          Copy-Item -Path 'src/BatCave.App/src-tauri/target/release/bundle/nsis/*.sig' -Destination dist/windows/

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: batcave-release-windows-${{ needs.prepare.outputs.tag }}
          path: dist/windows/*
          if-no-files-found: error
          retention-days: 30

  linux:
    name: Build Linux release
    needs: prepare
    runs-on: ubuntu-22.04
    environment: release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.source_sha }}

      - name: Verify protected release controls before sensitive work
        env:
          GH_TOKEN: ${{ secrets.RELEASE_ADMIN_READ_TOKEN }}
        run: node scripts/verify-release-controls.mjs "${{ github.repository }}"

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/BatCave.App/package-lock.json

      - uses: dtolnay/rust-toolchain@4e529fb27e59237866a6523e61ab248308c068b4 # 1.88.0
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: batcave-package-release-${{ runner.os }}-${{ runner.arch }}
          workspaces: src/BatCave.App/src-tauri -> target
          cache-workspace-crates: false
          save-if: false

      - run: bash scripts/install-linux-deps.sh

      - run: npm ci
        working-directory: src/BatCave.App

      - run: node scripts/verify-release-version.mjs "${{ needs.prepare.outputs.tag }}"

      - name: Validate Linux app
        run: bash scripts/validate-tauri.sh --skip-bundle

      - name: Build Linux release CLI
        run: bash scripts/build-linux-cli.sh

      - name: Bundle signed Linux updater
        working-directory: src/BatCave.App
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri -- build --config src-tauri/tauri.updater.conf.json

      - name: Verify Linux package version
        run: bash scripts/verify-linux-bundle.sh

      - name: Collect Linux distributables
        run: |
          mkdir -p dist/linux
          cp src/BatCave.App/src-tauri/target/release/bundle/deb/*.deb dist/linux/
          cp src/BatCave.App/src-tauri/target/release/bundle/appimage/*.AppImage dist/linux/
          cp src/BatCave.App/src-tauri/target/release/bundle/appimage/*.sig dist/linux/

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: batcave-release-linux-${{ needs.prepare.outputs.tag }}
          path: dist/linux/*
          if-no-files-found: error
          retention-days: 30

  macos:
    name: Build notarized universal macOS release
    needs: prepare
    runs-on: macos-15
    environment: release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.source_sha }}

      - name: Verify protected release controls before sensitive work
        env:
          GH_TOKEN: ${{ secrets.RELEASE_ADMIN_READ_TOKEN }}
        run: node scripts/verify-release-controls.mjs "${{ github.repository }}"

      - name: Preserve repository line endings
        run: git config --global core.autocrlf false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/BatCave.App/package-lock.json

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.97.1
          components: rustfmt
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: batcave-bundle-release-${{ runner.os }}-${{ runner.arch }}
          workspaces: src/BatCave.App/src-tauri -> target
          cache-workspace-crates: false
          save-if: false

      - run: npm ci
        working-directory: src/BatCave.App

      - run: node scripts/verify-release-version.mjs "${{ needs.prepare.outputs.tag }}"

      - name: Validate macOS app
        run: bash scripts/validate-tauri.sh --skip-bundle

      - name: Prepare Apple signing credentials
        shell: bash
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          required=(APPLE_API_KEY APPLE_API_ISSUER APPLE_API_KEY_CONTENT APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY TAURI_SIGNING_PRIVATE_KEY TAURI_SIGNING_PRIVATE_KEY_PASSWORD)
          for name in "${required[@]}"; do
            [[ -n "${!name:-}" ]] || { echo "Required release secret ${name} is missing." >&2; exit 1; }
          done

          key_path="${RUNNER_TEMP}/AuthKey_${APPLE_API_KEY}.p8"
          certificate_path="${RUNNER_TEMP}/batcave-developer-id.p12"
          keychain_path="${RUNNER_TEMP}/batcave-signing.keychain-db"
          keychain_password="$(openssl rand -hex 32)"

          echo "::add-mask::${keychain_password}"
          {
            echo "APPLE_API_KEY_PATH=${key_path}"
            echo "APPLE_CERTIFICATE_PATH=${certificate_path}"
            echo "APPLE_KEYCHAIN_PATH=${keychain_path}"
          } >> "${GITHUB_ENV}"

          printf '%s' "${APPLE_API_KEY_CONTENT}" > "${key_path}"
          chmod 600 "${key_path}"
          printf '%s' "${APPLE_CERTIFICATE}" | openssl base64 -d -A -out "${certificate_path}"
          chmod 600 "${certificate_path}"

          security create-keychain -p "${keychain_password}" "${keychain_path}"
          security set-keychain-settings -lut 21600 "${keychain_path}"
          security unlock-keychain -p "${keychain_password}" "${keychain_path}"
          security import "${certificate_path}" -k "${keychain_path}" -P "${APPLE_CERTIFICATE_PASSWORD}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${keychain_password}" "${keychain_path}"
          existing_keychains=()
          while IFS= read -r keychain; do existing_keychains+=("$keychain"); done < <(security list-keychains -d user | tr -d '"' | sed 's/^[[:space:]]*//')
          security list-keychains -d user -s "${keychain_path}" "${existing_keychains[@]}"
          security default-keychain -d user -s "${keychain_path}"
          security find-identity -v -p codesigning "${keychain_path}" | grep -F "${APPLE_SIGNING_IDENTITY}"

      - name: Build universal macOS binaries without packaging
        working-directory: src/BatCave.App
        env:
          CI: "true"
        run: npm run tauri -- build --target universal-apple-darwin --config src-tauri/tauri.macos.updater.ci.conf.json --no-bundle --ci

      - name: Assemble universal macOS CLI
        run: bash scripts/build-macos-universal-cli.sh --lipo-only

      - name: Bundle signed and notarized universal macOS updater
        working-directory: src/BatCave.App
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          CI: "true"
        run: npm run tauri -- build --target universal-apple-darwin --config src-tauri/tauri.macos.updater.ci.conf.json --ci

      - name: Sign, notarize, and staple the DMG
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          dmgs=(src/BatCave.App/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg)
          [[ "${#dmgs[@]}" -eq 1 ]] || { echo "Expected exactly one universal DMG; found ${#dmgs[@]}." >&2; exit 1; }
          codesign --force --timestamp --sign "${APPLE_SIGNING_IDENTITY}" "${dmgs[0]}"
          xcrun notarytool submit "${dmgs[0]}" --key "${APPLE_API_KEY_PATH}" --key-id "${APPLE_API_KEY}" --issuer "${APPLE_API_ISSUER}" --wait
          xcrun stapler staple "${dmgs[0]}"

      - name: Verify signing, notarization, universal binary, and DMG
        run: bash scripts/verify-macos-bundle.sh --mode release

      - name: Collect macOS distributables
        run: |
          mkdir -p dist/macos
          cp src/BatCave.App/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg dist/macos/
          cp src/BatCave.App/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz dist/macos/
          cp src/BatCave.App/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz.sig dist/macos/

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: batcave-release-macos-${{ needs.prepare.outputs.tag }}
          path: dist/macos/*
          if-no-files-found: error
          retention-days: 30

      - name: Remove temporary Apple credentials
        if: always()
        run: |
          if [[ -n "${APPLE_KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "${APPLE_KEYCHAIN_PATH}" || true
          fi
          credential_files=()
          [[ -n "${APPLE_API_KEY_PATH:-}" ]] && credential_files+=("${APPLE_API_KEY_PATH}")
          [[ -n "${APPLE_CERTIFICATE_PATH:-}" ]] && credential_files+=("${APPLE_CERTIFICATE_PATH}")
          if [[ "${#credential_files[@]}" -gt 0 ]]; then
            rm -f -- "${credential_files[@]}"
          fi

  finalize:
    name: Checksums, provenance, and release
    needs: [prepare, windows, linux, macos]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.source_sha }}

      - name: Verify protected release controls before sensitive work
        env:
          GH_TOKEN: ${{ secrets.RELEASE_ADMIN_READ_TOKEN }}
        run: node scripts/verify-release-controls.mjs "${{ github.repository }}"

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          package-manager-cache: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: batcave-release-*-${{ needs.prepare.outputs.tag }}
          path: release-input
          merge-multiple: false

      - name: Stage release assets without silent collisions
        run: node scripts/verify-release-candidate.mjs stage release-input dist

      - name: Generate signed update manifest
        run: node scripts/build-update-manifest.mjs "${{ needs.prepare.outputs.tag }}" "${{ github.repository }}" dist

      - name: Generate checksums
        run: |
          cd dist
          checksums="$(mktemp)"
          find . -maxdepth 1 -type f -print0 | sort -z | xargs -0 sha256sum > "${checksums}"
          mv "${checksums}" SHA256SUMS.txt
          sha256sum --check SHA256SUMS.txt

      - name: Verify pre-attestation release inventory
        run: node scripts/verify-release-candidate.mjs verify-inventory "${{ needs.prepare.outputs.tag }}" "${{ needs.prepare.outputs.prerelease }}" pre-attestation dist

      - name: Generate build provenance
        id: attest
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-checksums: dist/SHA256SUMS.txt

      - name: Retain provenance with release files
        run: cp "${{ steps.attest.outputs.bundle-path }}" "dist/BatCave-${{ needs.prepare.outputs.tag }}-provenance.json"

      - name: Verify complete release inventory
        run: node scripts/verify-release-candidate.mjs inventory "${{ needs.prepare.outputs.tag }}" "${{ needs.prepare.outputs.source_sha }}" "${{ needs.prepare.outputs.prerelease }}" dist "${RUNNER_TEMP}/release-candidate.json"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: batcave-release-${{ needs.prepare.outputs.tag }}
          path: dist/*
          if-no-files-found: error
          retention-days: 30

      - name: Retain exact pre-publication candidate inventory
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: batcave-release-candidate-${{ needs.prepare.outputs.tag }}
          path: ${{ runner.temp }}/release-candidate.json
          if-no-files-found: error
          retention-days: 1

      - name: Create and verify draft GitHub Release
        if: needs.prepare.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
          RELEASE_SOURCE_SHA: ${{ needs.prepare.outputs.source_sha }}
          PRERELEASE: ${{ needs.prepare.outputs.prerelease }}
        run: |
          set -euo pipefail
          candidate="${RUNNER_TEMP}/release-candidate.json"
          readback="${RUNNER_TEMP}/release-draft-readback.json"
          remote_tag_source() {
            local tag_sha
            tag_sha="$(git ls-remote origin "refs/tags/${RELEASE_TAG}^{}" | awk '{print $1}')"
            if [[ -z "${tag_sha}" ]]; then
              tag_sha="$(git ls-remote --refs origin "refs/tags/${RELEASE_TAG}" | awk '{print $1}')"
            fi
            printf '%s' "${tag_sha}"
          }

          node scripts/verify-release-candidate.mjs inventory "${RELEASE_TAG}" "${RELEASE_SOURCE_SHA}" "${PRERELEASE}" dist "${candidate}"
          tag_sha="$(remote_tag_source)"
          [[ -z "${tag_sha}" ]] || { echo "Release tag ${RELEASE_TAG} appeared during the build." >&2; exit 1; }

          args=(release create "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" --draft --target "${RELEASE_SOURCE_SHA}" --title "BatCave ${RELEASE_TAG}" --generate-notes)
          [[ "${PRERELEASE}" == "true" ]] && args+=(--prerelease)
          while IFS= read -r -d '' file; do args+=("${file}"); done < <(find dist -maxdepth 1 -type f -print0 | sort -z)
          gh "${args[@]}"

          [[ "$(remote_tag_source)" == "${RELEASE_SOURCE_SHA}" ]] || { echo "Draft release tag does not target ${RELEASE_SOURCE_SHA}." >&2; exit 1; }
          gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" > "${readback}"
          node scripts/verify-release-candidate.mjs verify-readback "${candidate}" "${readback}" true

      - name: Publish verified GitHub Release
        if: needs.prepare.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
          RELEASE_SOURCE_SHA: ${{ needs.prepare.outputs.source_sha }}
          PRERELEASE: ${{ needs.prepare.outputs.prerelease }}
        run: |
          set -euo pipefail
          candidate="${RUNNER_TEMP}/release-candidate.json"
          draft_readback="${RUNNER_TEMP}/release-prepublish-readback.json"
          readback="${RUNNER_TEMP}/release-published-readback.json"
          latest_readback="${RUNNER_TEMP}/release-latest-readback.json"
          latest_error="${RUNNER_TEMP}/release-latest-error.txt"
          node scripts/verify-release-candidate.mjs inventory "${RELEASE_TAG}" "${RELEASE_SOURCE_SHA}" "${PRERELEASE}" dist "${candidate}"

          remote_tag_sha="$(git ls-remote origin "refs/tags/${RELEASE_TAG}^{}" | awk '{print $1}')"
          if [[ -z "${remote_tag_sha}" ]]; then
            remote_tag_sha="$(git ls-remote --refs origin "refs/tags/${RELEASE_TAG}" | awk '{print $1}')"
          fi
          [[ "${remote_tag_sha}" == "${RELEASE_SOURCE_SHA}" ]] || { echo "Draft release tag does not target ${RELEASE_SOURCE_SHA}." >&2; exit 1; }
          gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" > "${draft_readback}"
          node scripts/verify-release-candidate.mjs verify-readback "${candidate}" "${draft_readback}" true

          publish_args=(release edit "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" --draft=false)
          [[ "${PRERELEASE}" == "true" ]] && publish_args+=(--latest=false) || publish_args+=(--latest)
          gh "${publish_args[@]}"

          remote_tag_sha="$(git ls-remote origin "refs/tags/${RELEASE_TAG}^{}" | awk '{print $1}')"
          if [[ -z "${remote_tag_sha}" ]]; then
            remote_tag_sha="$(git ls-remote --refs origin "refs/tags/${RELEASE_TAG}" | awk '{print $1}')"
          fi
          [[ "${remote_tag_sha}" == "${RELEASE_SOURCE_SHA}" ]] || { echo "Published release tag does not target ${RELEASE_SOURCE_SHA}." >&2; exit 1; }
          gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" > "${readback}"
          node scripts/verify-release-candidate.mjs verify-readback "${candidate}" "${readback}" false
          if gh api "repos/${GITHUB_REPOSITORY}/releases/latest" > "${latest_readback}" 2>"${latest_error}"; then
            :
          elif grep -q "HTTP 404" "${latest_error}"; then
            printf 'null\n' > "${latest_readback}"
          else
            cat "${latest_error}" >&2
            exit 1
          fi
          node scripts/verify-release-candidate.mjs verify-latest "${candidate}" "${latest_readback}"

      - name: Verify anonymous public release bytes and attestations
        if: needs.prepare.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          candidate="${RUNNER_TEMP}/release-candidate.json"
          readback="${RUNNER_TEMP}/release-published-readback.json"
          public_downloads="${RUNNER_TEMP}/release-public-downloads"
          node scripts/verify-public-release.mjs "${candidate}" "${readback}" "${public_downloads}"

  linux_deb_post_public_smoke:
