name: Versioned release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Version tag matching the app version
        required: true
        default: v0.2.0-rc.2
      channel:
        description: Release channel
        required: true
        type: choice
        options:
          - prerelease
          - stable
        default: prerelease
      publish:
        description: Create the GitHub Release after successful builds
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  prepare:
    name: Validate release identity
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      prerelease: ${{ steps.release.outputs.prerelease }}
      publish: ${{ steps.release.outputs.publish }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Validate tag, channel, and protected-main ancestry
        id: release
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_CHANNEL: ${{ inputs.channel }}
          INPUT_PUBLISH: ${{ inputs.publish }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            [[ "${GITHUB_REF}" == "refs/heads/main" ]] || { echo "Manual releases must run from main." >&2; exit 1; }
            tag="${INPUT_TAG}"
            channel="${INPUT_CHANNEL}"
            publish="${INPUT_PUBLISH}"
          else
            tag="${GITHUB_REF_NAME}"
            publish="true"
            [[ "${tag#v}" == *-* ]] && channel="prerelease" || channel="stable"
          fi

          node scripts/verify-release-version.mjs "${tag}"
          git fetch --no-tags origin main
          git merge-base --is-ancestor "${GITHUB_SHA}" origin/main || { echo "Release commit is not on protected main." >&2; exit 1; }

          prerelease="false"
          [[ "${tag#v}" == *-* ]] && prerelease="true"
          [[ "${channel}" == "prerelease" && "${prerelease}" == "true" ]] ||
            [[ "${channel}" == "stable" && "${prerelease}" == "false" ]] || {
              echo "Channel ${channel} does not match tag ${tag}." >&2
              exit 1
            }

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"
          echo "publish=${publish}" >> "${GITHUB_OUTPUT}"

      - name: Test release contracts
        run: node --test scripts/verify-release-version.test.mjs scripts/build-update-manifest.test.mjs

  windows:
    name: Build Windows release
    needs: prepare
    runs-on: windows-latest
    steps:
      - name: Preserve repository line endings
        run: git config --global core.autocrlf false

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/BatCave.App/package-lock.json

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.97.1
          components: rustfmt

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: batcave-bundle-release-${{ runner.os }}-${{ runner.arch }}
          workspaces: src/BatCave.App/src-tauri -> target
          cache-workspace-crates: false
          save-if: false

      - run: npm ci
        working-directory: src/BatCave.App

      - run: node scripts/verify-release-version.mjs "${{ needs.prepare.outputs.tag }}"

      - name: Validate Windows app
        shell: pwsh
        run: ./scripts/validate-tauri.ps1 -SkipBundle

      - name: Bundle signed Windows updater
        working-directory: src/BatCave.App
        env:
          BATCAVE_INSTALLED_RELEASE: "1"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri -- build --config src-tauri/tauri.updater.conf.json

      - name: Collect Windows distributables
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist/windows | Out-Null
          Copy-Item -LiteralPath src/BatCave.App/src-tauri/target/release/batcave-monitor.exe -Destination dist/windows/
          Copy-Item -LiteralPath src/BatCave.App/src-tauri/target/release/batcave-monitor-cli.exe -Destination dist/windows/
          Copy-Item -Path 'src/BatCave.App/src-tauri/target/release/bundle/nsis/*.exe' -Destination dist/windows/
          Copy-Item -Path 'src/BatCave.App/src-tauri/target/release/bundle/nsis/*.sig' -Destination dist/windows/

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: batcave-release-windows-${{ needs.prepare.outputs.tag }}
          path: dist/windows/*
          if-no-files-found: error
          retention-days: 30

  linux:
    name: Build Linux release
    needs: prepare
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/BatCave.App/package-lock.json

      - uses: dtolnay/rust-toolchain@4e529fb27e59237866a6523e61ab248308c068b4 # 1.88.0
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: batcave-package-release-${{ runner.os }}-${{ runner.arch }}
          workspaces: src/BatCave.App/src-tauri -> target
          cache-workspace-crates: false
          save-if: false

      - run: bash scripts/install-linux-deps.sh

      - run: npm ci
        working-directory: src/BatCave.App

      - run: node scripts/verify-release-version.mjs "${{ needs.prepare.outputs.tag }}"

      - name: Validate Linux app
        run: bash scripts/validate-tauri.sh --skip-bundle

      - name: Bundle signed Linux updater
        working-directory: src/BatCave.App
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri -- build --config src-tauri/tauri.updater.conf.json

      - name: Collect Linux distributables
        run: |
          mkdir -p dist/linux
          cp src/BatCave.App/src-tauri/target/release/bundle/deb/*.deb dist/linux/
          cp src/BatCave.App/src-tauri/target/release/bundle/appimage/*.AppImage dist/linux/
          cp src/BatCave.App/src-tauri/target/release/bundle/appimage/*.sig dist/linux/

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: batcave-release-linux-${{ needs.prepare.outputs.tag }}
          path: dist/linux/*
          if-no-files-found: error
          retention-days: 30

  macos:
    name: Build notarized universal macOS release
    needs: prepare
    runs-on: macos-15
    steps:
      - name: Preserve repository line endings
        run: git config --global core.autocrlf false

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/BatCave.App/package-lock.json

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.97.1
          components: rustfmt
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: batcave-bundle-release-${{ runner.os }}-${{ runner.arch }}
          workspaces: src/BatCave.App/src-tauri -> target
          cache-workspace-crates: false
          save-if: false

      - run: npm ci
        working-directory: src/BatCave.App

      - run: node scripts/verify-release-version.mjs "${{ needs.prepare.outputs.tag }}"

      - name: Validate macOS app
        run: bash scripts/validate-tauri.sh --skip-bundle

      - name: Prepare Apple signing credentials
        shell: bash
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          required=(APPLE_API_KEY APPLE_API_ISSUER APPLE_API_KEY_CONTENT APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY TAURI_SIGNING_PRIVATE_KEY TAURI_SIGNING_PRIVATE_KEY_PASSWORD)
          for name in "${required[@]}"; do
            [[ -n "${!name:-}" ]] || { echo "Required release secret ${name} is missing." >&2; exit 1; }
          done

          key_path="${RUNNER_TEMP}/AuthKey_${APPLE_API_KEY}.p8"
          certificate_path="${RUNNER_TEMP}/batcave-developer-id.p12"
          keychain_path="${RUNNER_TEMP}/batcave-signing.keychain-db"
          keychain_password="$(openssl rand -hex 32)"

          echo "::add-mask::${keychain_password}"
          {
            echo "APPLE_API_KEY_PATH=${key_path}"
            echo "APPLE_CERTIFICATE_PATH=${certificate_path}"
            echo "APPLE_KEYCHAIN_PATH=${keychain_path}"
          } >> "${GITHUB_ENV}"

          printf '%s' "${APPLE_API_KEY_CONTENT}" > "${key_path}"
          chmod 600 "${key_path}"
          printf '%s' "${APPLE_CERTIFICATE}" | openssl base64 -d -A -out "${certificate_path}"
          chmod 600 "${certificate_path}"

          security create-keychain -p "${keychain_password}" "${keychain_path}"
          security set-keychain-settings -lut 21600 "${keychain_path}"
          security unlock-keychain -p "${keychain_password}" "${keychain_path}"
          security import "${certificate_path}" -k "${keychain_path}" -P "${APPLE_CERTIFICATE_PASSWORD}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${keychain_password}" "${keychain_path}"
          existing_keychains=()
          while IFS= read -r keychain; do existing_keychains+=("$keychain"); done < <(security list-keychains -d user | tr -d '"' | sed 's/^[[:space:]]*//')
          security list-keychains -d user -s "${keychain_path}" "${existing_keychains[@]}"
          security default-keychain -d user -s "${keychain_path}"
          security find-identity -v -p codesigning "${keychain_path}" | grep -F "${APPLE_SIGNING_IDENTITY}"

      - name: Build universal macOS binaries without packaging
        working-directory: src/BatCave.App
        env:
          CI: "true"
        run: npm run tauri -- build --target universal-apple-darwin --config src-tauri/tauri.macos.updater.ci.conf.json --no-bundle --ci

      - name: Assemble universal macOS CLI
        run: bash scripts/build-macos-universal-cli.sh --lipo-only

      - name: Bundle signed and notarized universal macOS updater
        working-directory: src/BatCave.App
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          CI: "true"
        run: npm run tauri -- build --target universal-apple-darwin --config src-tauri/tauri.macos.updater.ci.conf.json --ci

      - name: Sign, notarize, and staple the DMG
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          dmgs=(src/BatCave.App/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg)
          [[ "${#dmgs[@]}" -eq 1 ]] || { echo "Expected exactly one universal DMG; found ${#dmgs[@]}." >&2; exit 1; }
          codesign --force --timestamp --sign "${APPLE_SIGNING_IDENTITY}" "${dmgs[0]}"
          xcrun notarytool submit "${dmgs[0]}" --key "${APPLE_API_KEY_PATH}" --key-id "${APPLE_API_KEY}" --issuer "${APPLE_API_ISSUER}" --wait
          xcrun stapler staple "${dmgs[0]}"

      - name: Verify signing, notarization, universal binary, and DMG
        run: bash scripts/verify-macos-bundle.sh --mode release

      - name: Collect macOS distributables
        run: |
          mkdir -p dist/macos
          cp src/BatCave.App/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg dist/macos/
          cp src/BatCave.App/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz dist/macos/
          cp src/BatCave.App/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz.sig dist/macos/

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: batcave-release-macos-${{ needs.prepare.outputs.tag }}
          path: dist/macos/*
          if-no-files-found: error
          retention-days: 30

      - name: Remove temporary Apple credentials
        if: always()
        run: |
          if [[ -n "${APPLE_KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "${APPLE_KEYCHAIN_PATH}" || true
          fi
          credential_files=()
          [[ -n "${APPLE_API_KEY_PATH:-}" ]] && credential_files+=("${APPLE_API_KEY_PATH}")
          [[ -n "${APPLE_CERTIFICATE_PATH:-}" ]] && credential_files+=("${APPLE_CERTIFICATE_PATH}")
          if [[ "${#credential_files[@]}" -gt 0 ]]; then
            rm -f -- "${credential_files[@]}"
          fi

  finalize:
    name: Checksums, provenance, and release
    needs: [prepare, windows, linux, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: batcave-release-*-${{ needs.prepare.outputs.tag }}
          path: dist
          merge-multiple: true

      - name: Normalize release filenames
        run: |
          python3 - <<'PY'
          from pathlib import Path
          for path in Path("dist").iterdir():
              if " " in path.name:
                  path.rename(path.with_name(path.name.replace(" ", ".")))
          PY

      - name: Generate signed update manifest
        run: node scripts/build-update-manifest.mjs "${{ needs.prepare.outputs.tag }}" "${{ github.repository }}" dist

      - name: Generate checksums
        run: |
          cd dist
          find . -maxdepth 1 -type f ! -name SHA256SUMS.txt -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt
          sha256sum --check SHA256SUMS.txt

      - name: Generate build provenance
        id: attest
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-checksums: dist/SHA256SUMS.txt

      - name: Retain provenance with release files
        run: cp "${{ steps.attest.outputs.bundle-path }}" "dist/BatCave-${{ needs.prepare.outputs.tag }}-provenance.json"

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: batcave-release-${{ needs.prepare.outputs.tag }}
          path: dist/*
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        if: needs.prepare.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
          PRERELEASE: ${{ needs.prepare.outputs.prerelease }}
        run: |
          args=(release create "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" --target "${GITHUB_SHA}" --title "BatCave ${RELEASE_TAG}" --generate-notes)
          [[ "${PRERELEASE}" == "true" ]] && args+=(--prerelease)
          while IFS= read -r -d '' file; do args+=("${file}"); done < <(find dist -maxdepth 1 -type f -print0)
          gh "${args[@]}"
