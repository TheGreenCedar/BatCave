name: Validation

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-policy:
    name: Repository policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Reject mutable GitHub Actions references
        run: |
          node --test scripts/validate-action-pins.test.mjs
          node scripts/validate-action-pins.mjs

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: moderate

  windows:
    name: Windows validation
    runs-on: windows-latest
    steps:
      - name: Preserve repository line endings
        run: git config --global core.autocrlf false

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/BatCave.App/package-lock.json

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: batcave-${{ runner.os }}-${{ runner.arch }}
          workspaces: src/BatCave.App/src-tauri -> target
          cache-on-failure: true
          cache-workspace-crates: true

      - name: Install frontend dependencies
        run: npm ci
        working-directory: src/BatCave.App

      - name: Check PowerShell script syntax
        shell: pwsh
        run: |
          $failed = $false
          Get-ChildItem -LiteralPath scripts -Filter *.ps1 | ForEach-Object {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $failed = $true
              $errors | ForEach-Object { Write-Error "$($_.Extent.File):$($_.Extent.StartLineNumber): $($_.Message)" }
            }
          }
          if ($failed) { exit 1 }

      - name: Validate Windows app
        shell: pwsh
        run: ./scripts/validate-tauri.ps1 -SkipBundle

      - name: Reject Rust warnings
        run: cargo clippy --manifest-path src/BatCave.App/src-tauri/Cargo.toml --all-targets -- -D warnings

  linux:
    name: Linux validation
    runs-on: ubuntu-latest
    steps:
      - name: Preserve repository line endings
        run: git config --global core.autocrlf false

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/BatCave.App/package-lock.json

      - uses: dtolnay/rust-toolchain@4e529fb27e59237866a6523e61ab248308c068b4 # 1.88.0
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: batcave-${{ runner.os }}-${{ runner.arch }}
          workspaces: src/BatCave.App/src-tauri -> target
          cache-on-failure: true
          cache-workspace-crates: true

      - name: Install Linux native dependencies
        run: bash scripts/install-linux-deps.sh

      - name: Install frontend dependencies
        run: npm ci
        working-directory: src/BatCave.App

      - name: Install accessibility test browser
        run: npx playwright install --with-deps chromium
        working-directory: src/BatCave.App

      - name: Validate bounded fixture accessibility
        run: npm run test:accessibility
        working-directory: src/BatCave.App

      - name: Check shell script syntax
        run: bash -n scripts/*.sh

      - name: Test release contracts
        run: node --test scripts/verify-release-version.test.mjs scripts/build-update-manifest.test.mjs scripts/verify-linux-bundle.test.mjs scripts/verify-release-candidate.test.mjs scripts/verify-release-controls.test.mjs scripts/verify-public-release.test.mjs scripts/validate-release-evidence-packet.test.mjs scripts/public-artifact-install-smoke.test.mjs

      - name: Validate Linux app
        run: bash scripts/validate-tauri.sh --skip-bundle

      - name: Reject Rust warnings on the MSRV
        run: cargo clippy --manifest-path src/BatCave.App/src-tauri/Cargo.toml --all-targets -- -D warnings

  macos:
    name: macOS universal validation
    runs-on: macos-15
    steps:
      - name: Preserve repository line endings
        run: git config --global core.autocrlf false

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/BatCave.App/package-lock.json

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: batcave-${{ runner.os }}-${{ runner.arch }}
          workspaces: src/BatCave.App/src-tauri -> target
          cache-on-failure: true
          cache-workspace-crates: true

      - name: Install frontend dependencies
        run: npm ci
        working-directory: src/BatCave.App

      - name: Check shell script syntax
        run: bash -n scripts/*.sh

      - name: Test release contracts
        run: node --test scripts/verify-release-version.test.mjs scripts/build-update-manifest.test.mjs scripts/verify-linux-bundle.test.mjs scripts/verify-release-candidate.test.mjs scripts/verify-release-controls.test.mjs scripts/verify-public-release.test.mjs scripts/validate-release-evidence-packet.test.mjs scripts/public-artifact-install-smoke.test.mjs

      - name: Validate native macOS app
        run: bash scripts/validate-tauri.sh --skip-bundle

      - name: Reject Rust warnings for both Apple architectures
        run: |
          cargo clippy --manifest-path src/BatCave.App/src-tauri/Cargo.toml --all-targets --target aarch64-apple-darwin -- -D warnings
          cargo clippy --manifest-path src/BatCave.App/src-tauri/Cargo.toml --all-targets --target x86_64-apple-darwin -- -D warnings
