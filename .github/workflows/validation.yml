name: Validation

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-policy:
    name: Repository policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Reject mutable GitHub Actions references
        run: |
          node --test scripts/validate-action-pins.test.mjs
          node scripts/validate-action-pins.mjs

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: moderate

  windows:
    name: Windows validation
    runs-on: windows-latest
    env:
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
    steps:
      - name: Preserve repository line endings
        run: git config --global core.autocrlf false

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/BatCave.App/package-lock.json

      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: 1.97.1
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: batcave-validation-${{ runner.os }}-${{ runner.arch }}
          workspaces: src/BatCave.App/src-tauri -> target
          save-if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Install frontend dependencies
        run: npm ci
        working-directory: src/BatCave.App

      - name: Check PowerShell script syntax
        shell: pwsh
        run: |
          $failed = $false
          Get-ChildItem -LiteralPath scripts -Filter *.ps1 | ForEach-Object {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $failed = $true
              $errors | ForEach-Object { Write-Error "$($_.Extent.File):$($_.Extent.StartLineNumber): $($_.Message)" }
            }
          }
          if ($failed) { exit 1 }

      - name: Test native artifact capability
        run: node --test scripts/native-install-smoke-executor.test.mjs scripts/linux-native-install-smoke-adapter.test.mjs scripts/capture-linux-current-user-persistence.test.mjs scripts/linux-post-public-smoke.test.mjs scripts/capture-macos-current-user-persistence.test.mjs scripts/capture-macos-dmg-current-user-persistence.test.mjs scripts/validate-current-user-persistence-evidence.test.mjs

      - name: Test release evidence index contract
        run: node --test scripts/validate-release-evidence-index.test.mjs

      - name: Reject Rust warnings
        run: cargo clippy --manifest-path src/BatCave.App/src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Reject private Windows lifecycle proof warnings
        env:
          BATCAVE_SOURCE_COMMIT_SHA: ${{ github.sha }}
        run: cargo clippy --locked --manifest-path src/BatCave.App/src-tauri/Cargo.toml --bin batcave-windows-lifecycle-proof --features private-windows-lifecycle-proof -- -D warnings

      - name: Validate Windows app
        shell: pwsh
        run: ./scripts/validate-tauri.ps1 -SkipBundle

      - name: Test private Windows lifecycle proof controller
        env:
          BATCAVE_SOURCE_COMMIT_SHA: ${{ github.sha }}
        run: cargo test --locked --manifest-path src/BatCave.App/src-tauri/Cargo.toml windows_lifecycle_proof --features private-windows-lifecycle-proof --lib

      - name: Build private Windows lifecycle proof controller
        env:
          BATCAVE_SOURCE_COMMIT_SHA: ${{ github.sha }}
        run: cargo build --locked --manifest-path src/BatCave.App/src-tauri/Cargo.toml --bin batcave-windows-lifecycle-proof --features private-windows-lifecycle-proof

  linux:
    name: Linux validation
    runs-on: ubuntu-22.04
    steps:
      - name: Preserve repository line endings
        run: git config --global core.autocrlf false

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/BatCave.App/package-lock.json

      - uses: dtolnay/rust-toolchain@46511b1c83438f0dd37c02d843619ece5a4abb5b # 1.97.1
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: batcave-validation-${{ runner.os }}-${{ runner.arch }}
          workspaces: src/BatCave.App/src-tauri -> target
          save-if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Install Linux native dependencies
        run: bash scripts/install-linux-deps.sh

      - name: Install frontend dependencies
        run: npm ci
        working-directory: src/BatCave.App

      - name: Install accessibility test browser
        run: npx playwright install --with-deps chromium
        working-directory: src/BatCave.App

      - name: Validate bounded fixture accessibility
        run: npm run test:accessibility
        working-directory: src/BatCave.App

      - name: Check shell script syntax
        run: bash -n scripts/*.sh

      - name: Test CI cache policy
        run: node --test scripts/validate-ci-cache-policy.test.mjs

      - name: Test release contracts
        run: node --test scripts/verify-release-version.test.mjs scripts/build-update-manifest.test.mjs scripts/verify-linux-bundle.test.mjs scripts/verify-release-candidate.test.mjs scripts/verify-release-controls.test.mjs scripts/verify-public-release.test.mjs scripts/linux-post-public-smoke.test.mjs scripts/validate-macos-updater-post-public-observation.test.mjs scripts/validate-release-platform-support.test.mjs scripts/validate-release-evidence-packet.test.mjs scripts/validate-release-evidence-index.test.mjs scripts/public-artifact-install-smoke.test.mjs scripts/native-install-smoke-executor.test.mjs scripts/linux-native-install-smoke-adapter.test.mjs scripts/capture-linux-current-user-persistence.test.mjs scripts/capture-macos-current-user-persistence.test.mjs scripts/capture-macos-dmg-current-user-persistence.test.mjs scripts/validate-current-user-persistence-evidence.test.mjs

      - name: Reject Rust warnings on the MSRV
        run: cargo clippy --manifest-path src/BatCave.App/src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Reject private public-release verifier warnings
        run: cargo clippy --manifest-path src/BatCave.App/src-tauri/Cargo.toml --bin batcave-install-smoke --tests --features private-release-verifier -- -D warnings

      - name: Validate Linux app
        run: bash scripts/validate-tauri.sh --skip-bundle

      - name: Test private public-release verifier
        run: cargo test --manifest-path src/BatCave.App/src-tauri/Cargo.toml --bin batcave-install-smoke --features private-release-verifier

  linux-package-transport:
    name: Linux package transport
    runs-on: ubuntu-22.04
    steps:
      - name: Preserve repository line endings
        run: git config --global core.autocrlf false

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/BatCave.App/package-lock.json

      - uses: dtolnay/rust-toolchain@46511b1c83438f0dd37c02d843619ece5a4abb5b # 1.97.1
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: batcave-package-release-${{ runner.os }}-${{ runner.arch }}
          workspaces: src/BatCave.App/src-tauri -> target
          cache-workspace-crates: false
          save-if: false

      - name: Install Linux native dependencies
        run: bash scripts/install-linux-deps.sh

      - name: Install frontend dependencies
        run: npm ci
        working-directory: src/BatCave.App

      - name: Probe closed Linux package transports
        run: |
          bash scripts/validate-tauri.sh --bundle-only
          cargo test --release --manifest-path src/BatCave.App/src-tauri/Cargo.toml --test linux_package_owned_transport -- --ignored --nocapture

  macos:
    name: macOS Apple Silicon validation
    runs-on: macos-15
    steps:
      - name: Preserve repository line endings
        run: git config --global core.autocrlf false

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/BatCave.App/package-lock.json

      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: 1.97.1
          components: rustfmt, clippy
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: batcave-validation-${{ runner.os }}-${{ runner.arch }}
          workspaces: src/BatCave.App/src-tauri -> target
          save-if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Install frontend dependencies
        run: npm ci
        working-directory: src/BatCave.App

      - name: Check shell script syntax
        run: bash -n scripts/*.sh

      - name: Test release contracts
        run: node --test scripts/verify-release-version.test.mjs scripts/build-update-manifest.test.mjs scripts/verify-linux-bundle.test.mjs scripts/verify-release-candidate.test.mjs scripts/verify-release-controls.test.mjs scripts/verify-public-release.test.mjs scripts/linux-post-public-smoke.test.mjs scripts/validate-macos-updater-post-public-observation.test.mjs scripts/validate-release-platform-support.test.mjs scripts/validate-release-evidence-packet.test.mjs scripts/validate-release-evidence-index.test.mjs scripts/public-artifact-install-smoke.test.mjs scripts/native-install-smoke-executor.test.mjs scripts/linux-native-install-smoke-adapter.test.mjs scripts/capture-linux-current-user-persistence.test.mjs scripts/capture-macos-current-user-persistence.test.mjs scripts/capture-macos-dmg-current-user-persistence.test.mjs scripts/validate-current-user-persistence-evidence.test.mjs

      - name: Reject Rust warnings for Apple Silicon
        run: cargo clippy --manifest-path src/BatCave.App/src-tauri/Cargo.toml --all-targets --target aarch64-apple-darwin -- -D warnings

      - name: Verify private macOS updater staging observer
        run: |
          cargo clippy --locked --manifest-path src/BatCave.App/src-tauri/Cargo.toml --bin batcave-install-smoke --tests --features private-release-verifier -- -D warnings
          cargo test --locked --manifest-path src/BatCave.App/src-tauri/Cargo.toml --bin batcave-install-smoke --features private-release-verifier

      - name: Validate native macOS app
        run: bash scripts/validate-tauri.sh --skip-bundle
