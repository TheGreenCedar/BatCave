[package]
name = "batcave-monitor"
version = "0.1.0"
description = "Lightweight BatCave resource monitor"
authors = ["BatCave"]
edition = "2021"
rust-version = "1.80"

[lib]
name = "batcave_monitor_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.4.1", features = [] }

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sysinfo = "0.38.4"
tauri = { version = "2.10.3", features = [] }
